server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: library-rfid-security

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/library_rfid?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # JWT配置
  jwt:
    secret: library_rfid_security_secret_key_2024
    expiration: 86400000  # 24小时
    header: Authorization
    token-prefix: Bearer

  # MyBatis-Plus配置
  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.library.entity
    global-config:
      db-config:
        logic-delete-field: deleted  # 全局逻辑删除字段名
        logic-delete-value: 1       # 逻辑已删除值
        logic-not-delete-value: 0   # 逻辑未删除值
    configuration:
      map-underscore-to-camel-case: true
      cache-enabled: true

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 日志配置
logging:
  level:
    com.library: info
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 安全配置
security:
  # 登录失败锁定配置
  login:
    max-attempts: 5
    lock-time: 300  # 5分钟

# 加密配置
encryption:
  # AES加密密钥
  aes-key: library_rfid_encryption_key_2024
  # AES加密向量
  aes-iv: library_rfid_encryption_iv_2024

# 性能配置
performance:
  # 接口限流配置
  rate-limit:
    enabled: true
    requests: 100
    duration: 60  # 每分钟100次请求

# 系统配置
system:
  # 文件上传路径
  upload:
    path: ./uploads
  # 日志保存天数
  log:
    retention-days: 30